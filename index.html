<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
	<title>Clue Notepad</title>

	<link rel="shortcut icon" type="image/x-icon" href="Assets/favicon.ico"/>
	<link rel="stylesheet" type="text/css" href="index.css">
	<script src="index.js"></script>
</head>
<body>
	<main class="clipboard">
		<img class="clip clip--bg" src="Assets/Clip BG.png">
		<div class="paper">
			<section class="section">
				<button class="btn players__btn">
					<svg class="icon"><use href="Assets/sprites.svg#Person_Edit"/></svg>
				</button>
				<div id="players" class="players"></div>
			</section>
			<section class="section">
				<div class="section__title">Suspects</div>
				<div id="suspects" class="section__grid"></div>
			</section>
			<section class="section">
				<div class="section__title">Weapons</div>
				<div id="weapons" class="section__grid"></div>
			</section>
			<section class="section">
				<div class="section__title">Rooms</div>
				<div id="rooms" class="section__grid"></div>
			</section>
		</div>
		<img class="clip" src="Assets/Clip.png">
	</main>
</body>
</html>
