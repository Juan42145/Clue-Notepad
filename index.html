<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
	<title>Clue Notepad</title>

	<link rel="shortcut icon" type="image/x-icon" href="Assets/favicon.ico"/>
	<link rel="stylesheet" type="text/css" href="index.css">
	<script src="index.js"></script>
</head>
<body>
	<main>
		<div class="clipboard">
			<img class="clip clip--bg" src="Assets/Clip BG.png">
			<div class="paper">
				<section class="section">
					<button class="btn players__btn" onclick="openMenu()">
						<svg class="icon"><use href="Assets/sprites.svg#Person_Edit"/></svg>
					</button>
					<div id="players" class="players"></div>
				</section>
				<section class="section">
					<div class="section__title">Suspects</div>
					<div id="suspects" class="section__grid"></div>
				</section>
				<section class="section">
					<div class="section__title">Weapons</div>
					<div id="weapons" class="section__grid"></div>
				</section>
				<section class="section">
					<div class="section__title">Rooms</div>
					<div id="rooms" class="section__grid"></div>
				</section>
			</div>
			<img class="clip" src="Assets/Clip.png">
		</div>
	</main>
	<footer class="interface">
		<div class="controls">
			<button class="btn interface__btn">
				<svg class="icon"><use href="Assets/sprites.svg#Circle"/></svg>
			</button>
			<button class="btn interface__btn">
				<svg class="icon"><use href="Assets/sprites.svg#Cross"/></svg>
			</button>
		</div>
		<div class="editing">
			<button class="btn interface__btn">
				<svg class="icon"><use href="Assets/sprites.svg#Edit_On"/></svg>
			</button>
			<button class="btn interface__btn hide">
				<svg class="icon"><use href="Assets/sprites.svg#Edit_Off"/></svg>
			</button>
		</div>
		<div class="notes">
			<div class="notes__group">
				<button class="btn notes__btn--check">
					<svg class="icon"><use href="Assets/sprites.svg#Check"/></svg>
				</button>
				<button class="btn notes__btn--x">
					<svg class="icon"><use href="Assets/sprites.svg#X"/></svg>
				</button>
				<button class="btn">
					<svg class="icon"><use href="Assets/sprites.svg#?"/></svg>
				</button>
				<button class="btn">
					<svg class="icon"><use href="Assets/sprites.svg#!"/></svg>
				</button>
				<button class="btn">
					<svg class="icon"><use href="Assets/sprites.svg#Delete"/></svg>
				</button>
			</div>
			<div class="notes__group">
				<button class="btn"><div class="notes__text">1</div></button>
				<button class="btn"><div class="notes__text">2</div></button>
				<button class="btn"><div class="notes__text">3</div></button>
				<button class="btn"><div class="notes__text">4</div></button>
				<button class="btn"><div class="notes__text">5</div></button>
			</div>
		</div>
	</footer>

	<dialog id="edit-players" onclick="this.close()">
		<form class="menu" onclick="event.stopPropagation()" onsubmit="event.preventDefault(); handleForm(this)">
			<input class="menu__input" type="text" maxlength="3" name="1" id="p1" placeholder="Player 1 Initials">
			<input class="menu__input" type="text" maxlength="3" name="2" id="p2" placeholder="Player 2 Initials">
			<input class="menu__input" type="text" maxlength="3" name="3" id="p3" placeholder="Player 3 Initials">
			<input class="menu__input" type="text" maxlength="3" name="4" id="p4" placeholder="Player 4 Initials">
			<input class="menu__input" type="text" maxlength="3" name="5" id="p5" placeholder="Player 5 Initials">
			<input class="menu__input" type="text" maxlength="3" name="6" id="p6" placeholder="Player 6 Initials">
			<button class="btn menu__submit" type="submit">Submit</button>
		</form>
	</dialog>
</body>
</html>
